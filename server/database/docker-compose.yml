version: "3.9"

services:
  mongo_db:
    container_name: db_container
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: node_api
    ports:
      - "3030:3030"
    depends_on:
      - mongo_db

volumes:
  mongo_data: